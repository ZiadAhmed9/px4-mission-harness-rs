[scenario]
name = "High delay mission"
description = "Tests mission completion under 500ms delay with 200ms jitter"

[mission]
takeoff_altitude = 10.0

[[mission.waypoints]]
latitude = 47.397742
longitude = 8.545594
altitude = 10.0
acceptance_radius = 5.0

[faults]
delay_ms = 500
jitter_ms = 200

[[assertions]]
type = "waypoint_reached"
waypoint_index = 0
timeout_secs = 120

[[assertions]]
type = "landed"
timeout_secs = 180
